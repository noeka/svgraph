name: Infection

# Mutation testing gates pull requests targeting main. Thresholds live in
# infection.json5 (minMsi / minCoveredMsi). The job also remains available
# from the Actions tab as "Run workflow" for ad-hoc baseline runs.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  mutate:
    name: Infection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Infection
        run: composer mutate -- --no-progress --logger-github

      - name: Publish summary
        if: always()
        run: |
          if [ -f build/infection/summary.log ]; then
            {
              echo "## Infection summary"
              echo ""
              echo '```'
              cat build/infection/summary.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infection-report
          path: build/infection/
          if-no-files-found: ignore
